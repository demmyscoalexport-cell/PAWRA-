# PAWRA → Shopify Oxygen
#
# Required: GitHub repository (or Environment → production) secret named:
#   SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN
#
# Also accepts: OXYGEN_DEPLOYMENT_TOKEN, OXYGEN_DEPLOYMENT_TOKEN_157631
#
# Do NOT pass --env in CI — Oxygen picks the environment from the Git branch.
# Ensure Hydrogen Production environment is linked to branch `main`.

name: Deploy to Oxygen

on:
  push:
  workflow_dispatch:
    inputs:
      target:
        description: Oxygen environment
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Hydrogen to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: oxygen-${{ github.ref == 'refs/heads/main' && 'production' || format('preview-{0}', github.ref_name) }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: hydrogen-quickstart
    env:
      SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN || secrets.OXYGEN_DEPLOYMENT_TOKEN || secrets.OXYGEN_DEPLOYMENT_TOKEN_157631 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: hydrogen-quickstart/package-lock.json

      - name: Verify Oxygen deployment token secret
        run: |
          if [ -z "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN" ]; then
            echo "::error::No Oxygen deployment token found in GitHub Actions secrets."
            echo ""
            echo "Add a REPOSITORY secret:"
            echo "  GitHub → PAWRA- → Settings → Secrets and variables → Actions"
            echo "  Repository secrets → New repository secret"
            echo "  Name:  SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
            echo "  Value: paste the full Oxygen token (usually starts with eyJ...)"
            echo ""
            echo "Or Environments → production → Environment secrets with the same name."
            exit 1
          fi
          echo "Oxygen deployment token is set (${#SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN} chars)."

      - name: Install dependencies
        run: npm ci

      - name: Build Hydrogen storefront
        run: npm run build
        env:
          NODE_ENV: production

      - name: Publish to Oxygen (Production)
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
        run: >
          npm exec -- shopify hydrogen deploy
          --token "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
          --no-lockfile-check
          --build-command "true"
          --metadata-user "github-actions"
        env:
          CI: true

      - name: Publish to Oxygen (Preview)
        if: |
          (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
        run: >
          npm exec -- shopify hydrogen deploy
          --token "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
          --preview
          --no-lockfile-check
          --build-command "true"
          --metadata-user "github-actions"
        env:
          CI: true
