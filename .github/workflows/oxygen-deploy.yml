# PAWRA → Shopify Oxygen
#
# Preferred GitHub Repository secret name:
#   SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN
#
# Also accepted (in order):
#   OXYGEN_DEPLOYMENT_TOKEN
#   oxygen_deployment_token
#   OXYGEN_DEPLOYMENT_TOKEN_157631
#
# Do NOT pass --env in CI — Oxygen picks the environment from the Git branch.

name: Deploy to Oxygen

on:
  push:
  workflow_dispatch:
    inputs:
      target:
        description: Oxygen environment
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Hydrogen to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    concurrency:
      group: oxygen-${{ github.ref == 'refs/heads/main' && 'production' || format('preview-{0}', github.ref_name) }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: hydrogen-quickstart

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: hydrogen-quickstart/package-lock.json

      - name: Resolve Oxygen deployment token
        id: token
        env:
          S1: ${{ secrets.SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN }}
          S2: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN }}
          S3: ${{ secrets.oxygen_deployment_token }}
          S4: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_157631 }}
        run: |
          echo "Secret name check (lengths only — values never printed):"
          echo "  SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN = ${#S1} chars"
          echo "  OXYGEN_DEPLOYMENT_TOKEN          = ${#S2} chars"
          echo "  oxygen_deployment_token          = ${#S3} chars"
          echo "  OXYGEN_DEPLOYMENT_TOKEN_157631   = ${#S4} chars"

          TOKEN=""
          if [ -n "$S1" ]; then TOKEN="$S1"; NAME="SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
          elif [ -n "$S2" ]; then TOKEN="$S2"; NAME="OXYGEN_DEPLOYMENT_TOKEN"
          elif [ -n "$S3" ]; then TOKEN="$S3"; NAME="oxygen_deployment_token"
          elif [ -n "$S4" ]; then TOKEN="$S4"; NAME="OXYGEN_DEPLOYMENT_TOKEN_157631"
          fi

          if [ -z "$TOKEN" ]; then
            echo "::error::No Oxygen token found under any known secret name."
            echo "Rename your Repository secret to exactly: SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
            echo "(GitHub secret names cannot contain spaces — use underscores.)"
            exit 1
          fi

          echo "Using secret name: $NAME (${#TOKEN} chars)"
          echo "::add-mask::$TOKEN"
          echo "SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build Hydrogen storefront
        run: npm run build
        env:
          NODE_ENV: production

      - name: Publish to Oxygen (Production)
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
        run: >
          npm exec -- shopify hydrogen deploy
          --token "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
          --no-lockfile-check
          --build-command "true"
          --metadata-user "github-actions"
        env:
          CI: true

      - name: Publish to Oxygen (Preview)
        if: |
          (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
        run: >
          npm exec -- shopify hydrogen deploy
          --token "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
          --preview
          --no-lockfile-check
          --build-command "true"
          --metadata-user "github-actions"
        env:
          CI: true
