# PAWRA → Shopify Oxygen
# Requires GitHub secret: SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN
# Create the token in: Hydrogen Admin → Storefront settings → Oxygen deployments
# Secret name MUST be exactly: SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN
#
# main branch / production dispatch → Production (--env production)
# other branches / preview dispatch → Preview (--preview)

name: Deploy to Oxygen

on:
  push:
  workflow_dispatch:
    inputs:
      target:
        description: Oxygen environment
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Hydrogen to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    concurrency:
      group: oxygen-${{ github.ref == 'refs/heads/main' && 'production' || format('preview-{0}', github.ref_name) }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: hydrogen-quickstart

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: hydrogen-quickstart/package-lock.json

      - name: Verify Oxygen deployment token secret
        env:
          TOKEN: ${{ secrets.SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::GitHub secret SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN is missing or empty."
            echo "Create a token in Shopify Admin → Hydrogen → Storefront settings → Oxygen deployments,"
            echo "then add it as a repository secret named exactly SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN."
            exit 1
          fi
          echo "SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN is set (${#TOKEN} chars)."

      - name: Install dependencies
        run: npm ci

      - name: Build Hydrogen storefront
        run: npm run build
        env:
          NODE_ENV: production

      - name: Publish to Oxygen (Production)
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
        run: >
          npm exec -- shopify hydrogen deploy
          --token "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
          --no-lockfile-check
          --build-command "true"
          --env production
          --metadata-user "github-actions"
        env:
          CI: true
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN }}

      - name: Publish to Oxygen (Preview)
        if: |
          (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
        run: >
          npm exec -- shopify hydrogen deploy
          --token "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
          --preview
          --no-lockfile-check
          --build-command "true"
          --metadata-user "github-actions"
        env:
          CI: true
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN }}
