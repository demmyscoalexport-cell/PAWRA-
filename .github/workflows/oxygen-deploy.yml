# PAWRA → Shopify Oxygen
#
# Required GitHub repository secret (Settings → Secrets and variables → Actions):
#   Name:  SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN
#   Value: token from Shopify Admin → Hydrogen → Storefront settings → Oxygen deployments
#
# Also accepts legacy/alternate names if present:
#   OXYGEN_DEPLOYMENT_TOKEN
#
# main / production dispatch → Production
# other branches / preview   → Preview

name: Deploy to Oxygen

on:
  push:
  workflow_dispatch:
    inputs:
      target:
        description: Oxygen environment
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Hydrogen to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    concurrency:
      group: oxygen-${{ github.ref == 'refs/heads/main' && 'production' || format('preview-{0}', github.ref_name) }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: hydrogen-quickstart
    env:
      # Prefer the Shopify-documented name; fall back to a common alternate.
      SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN || secrets.OXYGEN_DEPLOYMENT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: hydrogen-quickstart/package-lock.json

      - name: Verify Oxygen deployment token secret
        run: |
          if [ -z "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN" ]; then
            echo "::error::No Oxygen deployment token found in GitHub Actions secrets."
            echo ""
            echo "Fix:"
            echo "  1. Shopify Admin → Sales channels → Hydrogen → your storefront"
            echo "  2. Storefront settings → Oxygen deployments → Create/copy token"
            echo "  3. GitHub → PAWRA- → Settings → Secrets and variables → Actions"
            echo "  4. New repository secret named EXACTLY:"
            echo "       SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
            echo "  5. Paste the token value and save, then re-run this workflow"
            exit 1
          fi
          echo "Oxygen deployment token is set (${#SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN} chars)."

      - name: Install dependencies
        run: npm ci

      - name: Build Hydrogen storefront
        run: npm run build
        env:
          NODE_ENV: production

      - name: Publish to Oxygen (Production)
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
        run: >
          npm exec -- shopify hydrogen deploy
          --token "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
          --no-lockfile-check
          --build-command "true"
          --env production
          --metadata-user "github-actions"
        env:
          CI: true

      - name: Publish to Oxygen (Preview)
        if: |
          (github.event_name == 'push' && github.ref != 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
        run: >
          npm exec -- shopify hydrogen deploy
          --token "$SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN"
          --preview
          --no-lockfile-check
          --build-command "true"
          --metadata-user "github-actions"
        env:
          CI: true
